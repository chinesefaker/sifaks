<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Sifaks Ousmail SO favicon">
  <defs>
    <linearGradient id="so-ring" x1="128" y1="96" x2="384" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="so-letters" x1="156" y1="184" x2="356" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b7e9ff"/>
      <stop offset="0.55" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#b8a6ff"/>
    </linearGradient>
    <filter id="letter-glow" x="-12%" y="-16%" width="124%" height="132%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#7dd3fc" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#080b12"/>
  <circle cx="256" cy="256" r="204" fill="rgba(125,211,252,0.06)" stroke="url(#so-ring)" stroke-width="20"/>
  <text x="256" y="304" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="150" font-weight="400" letter-spacing="8" fill="url(#so-letters)" stroke="url(#so-letters)" stroke-width="2" stroke-linejoin="round" paint-order="stroke fill" filter="url(#letter-glow)">SO</text>
</svg>
